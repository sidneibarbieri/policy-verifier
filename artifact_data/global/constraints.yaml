# SOCpilot official policy rule set.
# Frozen before provider execution. Changes define a separate evaluation state.
#
# Rule types:
#   mandatory        - action MUST be present when telemetry scope matches
#   prohibit_before  - condition_action MUST precede action in the plan
#   require_approval - action is removed (or deferred) without explicit approval
#
# Design rationale:
#   R1     - containment on confirmed command execution evidence
#   R2     - evidence preservation: forensics before restoration
#   R3,R4  - approval gates on high-impact reversible/irreversible actions

# Mandatory containment
- rule_id: R1
  rationale: isolate host on high-confidence reverse-shell evidence
  evidence_basis: command telemetry contains reverse-shell indicators
  repair_operator: insert
  official_eval_activated: false
  scope:
    event_type_contains: ["command_execution"]
    command_contains: ["bash -i", "/dev/tcp/"]
  type: mandatory
  action: isolate_host
  severity: hard

# Ordering: forensics-first principle
- rule_id: R2
  rationale: preserve forensic opportunity before recovery changes system state
  evidence_basis: action sequence proposes restoration before forensics
  repair_operator: insert_before
  official_eval_activated: false
  scope:
    global: true
  type: prohibit_before
  action: restore_host
  condition_action: collect_forensics
  severity: hard

# Approval gates
- rule_id: R3
  rationale: restoration changes production state and requires explicit approval
  evidence_basis: action sequence includes restore_host without public approval evidence
  repair_operator: remove
  alternative_repair_operator: defer_to_human_approval
  official_eval_activated: true
  approval_evidence:
    source: public_canonical_package
    default_when_absent: not_approved
  scope:
    global: true
  type: require_approval
  action: restore_host
  severity: hard

- rule_id: R4
  rationale: isolation can interrupt business workflow and requires explicit approval
  evidence_basis: action sequence includes isolate_host without public approval evidence
  repair_operator: remove
  alternative_repair_operator: defer_to_human_approval
  official_eval_activated: true
  approval_evidence:
    source: public_canonical_package
    default_when_absent: not_approved
  scope:
    global: true
  type: require_approval
  action: isolate_host
  severity: hard
