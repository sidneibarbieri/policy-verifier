# ATT&CK mapping rules.
# Frozen before any LLM execution. Changes require a new protocol version.
#
# These rules map normalized SOAR telemetry events to MITRE ATT&CK
# techniques via weighted signal scoring (see attack.py).
#
# Telemetry characteristics:
#   - command_execution events carry the richest detection-name signal
#   - case_note events carry normalized SIEM or analyst label text
#   - source_type is effectively uniform (SOAR_EXPORT) and is therefore kept
#     at near-zero discriminative weight
#
# Weight design:
#   event_type_weight: 0.40  - necessary but not sufficient alone
#   category_weight:   0.30  - most discriminative signal (detection name)
#   command_weight:    0.25  - discriminative on case_note events
#   source_type_weight: 0.05 - uniform (SOAR_EXPORT), near-zero signal
#   Sum: 1.0 (perfect match)
#
# Threshold: min_confidence 0.55 requires event_type + at least one
# discriminative signal (category or command) to fire.

# Execution

- rule_id: ATTACK_R01
  technique_id: T1059.001
  technique_name: PowerShell
  tactic_id: TA0002
  tactic_name: Execution
  event_type_contains:
    - command_execution
  category_contains:
    - powershell
  event_type_weight: 0.40
  category_weight: 0.30
  command_weight: 0.25
  source_type_weight: 0.05
